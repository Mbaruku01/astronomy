<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stargazing Hubs - Ethno-Astronomy Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght=0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at 50% 0%, #121420 0%, #07080d 70%, #020204 100%);
            background-attachment: fixed;
        }
        .serif-title { font-family: 'Playfair Display', serif; }
        
        .ios-glass {
            background: rgba(15, 17, 28, 0.45);
            backdrop-filter: blur(30px) saturate(190%);
            -webkit-backdrop-filter: blur(30px) saturate(190%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .ios-glass-card {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .ios-glass-card:hover {
            background: rgba(255, 255, 255, 0.035);
            border-color: rgba(197, 168, 128, 0.3);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(197, 168, 128, 0.3); }
    </style>
</head>
<body class="text-zinc-400 min-h-screen flex flex-col antialiased selection:bg-amber-500/20 selection:text-amber-200">

    <header class="ios-glass sticky top-0 z-40 px-6 py-4 lg:px-10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b">
        <div>
            <div class="flex items-center gap-2 text-[9px] tracking-[0.25em] text-[#C5A880] font-bold uppercase mb-1">
                <i class="fa-solid fa-star text-[10px]"></i> Observational Mapping Matrix
            </div>
            <h1 class="serif-title text-xl lg:text-2xl font-medium tracking-wide text-zinc-100">Cultural Landscapes & Horizons</h1>
        </div>
        
        <div>
            <a href="index.html" class="inline-flex items-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-zinc-500 text-zinc-300 hover:text-white px-4 py-2 rounded-full text-xs font-medium transition-all">
                <i class="fa-solid fa-arrow-left text-[10px]"></i>
                <span>Return to Archive</span>
            </a>
        </div>
    </header>

    <main class="flex-1 p-6 lg:p-10 max-w-7xl mx-auto w-full">
        <div class="mb-8 border-b border-white/5 pb-4">
            <p class="text-[11px] text-zinc-400 font-medium uppercase tracking-wider">
                10 Documented Ethnographic Fields & Observation Hubs
            </p>
        </div>

        <div id="locationGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // Data for the 10 cultural observation regions
        const starLocations = [
            { id: "kagera", name: "Kagera (Bukoba)", skyCondition: "Bortle Class 2 • Exceptional", altitude: "1,150m", icon: "fa-shield-halved", loreFocus: "Haya Navigation & Frontier Guardians", link: "archive.html?region=Kagera" },
            { id: "mwanza", name: "Mwanza (Lake Victoria Basin)", skyCondition: "Bortle Class 3 • Clear", altitude: "1,140m", icon: "fa-seedling", loreFocus: "Sukuma & Nyamwezi Agricultural Forecasts", link: "archive.html?region=Mwanza" },
            { id: "arusha", name: "Monduli Plains (Arusha)", skyCondition: "Bortle Class 1 • Pristine Dark Sky", altitude: "1,400m", icon: "fa-route", loreFocus: "Maasai Ancestral Cosmological Roads", link: "archive.html?region=Arusha" },
            { id: "lindi", name: "Lindi Coastal Zone", skyCondition: "Bortle Class 2 • High Visibility", altitude: "12m", icon: "fa-water", loreFocus: "Makonde Maritime Tidal & Reef Tracking", link: "archive.html?region=Lindi" },
            { id: "dodoma", name: "Dodoma Rural Savannah", skyCondition: "Bortle Class 1 • Dry/Acre Skies", altitude: "1,120m", icon: "fa-compass", loreFocus: "Gogo Caravan Vectors & Trade Alignment", link: "archive.html?region=Dodoma" },
            { id: "iringa", name: "Iringa (Southern Highlands)", skyCondition: "Bortle Class 2 • Crisp/Cold", altitude: "1,550m", icon: "fa-stairs", loreFocus: "Hehe Ancestral Ladders & Royal Lineage", link: "archive.html?region=Iringa" },
            { id: "rukwa", name: "Sumbawanga Plateau (Rukwa)", skyCondition: "Bortle Class 1 • Unpolluted Horizon", altitude: "1,800m", icon: "fa-location-crosshairs", loreFocus: "Fipa Wildlife Migration & Hunting Triggers", link: "archive.html?region=Rukwa" },
            { id: "tanga", name: "Handeni Hinterlands (Tanga)", skyCondition: "Bortle Class 3 • Stable Air", altitude: "290m", icon: "fa-ring", loreFocus: "Zigua Matriarchal Phase & Rite Planning", link: "archive.html?region=Tanga" },
            { id: "kigoma", name: "Lake Tanganyika Coast (Kigoma)", skyCondition: "Bortle Class 2 • Humid/Luminous", altitude: "770m", icon: "fa-bucket", loreFocus: "Ha Hydrological Basin Tipping Cycles", link: "archive.html?region=Kigoma" },
            { id: "morogoro", name: "Uluguru Mountains (Morogoro)", skyCondition: "Bortle Class 2 • High Elevation", altitude: "2,200m", icon: "fa-wind", loreFocus: "Luguru Mountain Wind & Shield Preparedness", link: "archive.html?region=Morogoro" }
        ];

        const grid = document.getElementById('locationGrid');

        function renderCards() {
            grid.innerHTML = '';
            
            starLocations.forEach(place => {
                const card = document.createElement('div');
                card.className = "ios-glass-card rounded-2xl p-6 flex flex-col justify-between transition-all duration-300 transform group cursor-pointer";
                
                // Clicking anywhere on the card container redirects automatically
                card.onclick = () => { window.location.href = place.link; };

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start gap-2 mb-6">
                            <span class="text-[9px] tracking-wider uppercase bg-[#C5A880]/10 text-[#C5A880] font-semibold px-2.5 py-0.5 rounded-full border border-[#C5A880]/20">
                                ${place.altitude} Elevation
                            </span>
                            <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-zinc-500 group-hover:text-[#C5A880] group-hover:scale-105 border border-white/5 transition-all text-xs">
                                <i class="fa-solid ${place.icon}"></i>
                            </div>
                        </div>
                        
                        <h2 class="serif-title text-xl font-medium tracking-wide text-zinc-100 group-hover:text-[#C5A880] transition-colors mb-2">
                            ${place.name}
                        </h2>
                        <p class="text-xs text-zinc-500 font-mono tracking-tight mb-4 flex items-center gap-1.5">
                            <i class="fa-solid fa-eye text-[10px] text-zinc-600"></i> ${place.skyCondition}
                        </p>
                        
                        <div class="border-t border-white/5 pt-4 mb-6">
                            <span class="text-[9px] uppercase font-bold tracking-wider text-zinc-600 block mb-1">Primary Archive Vector</span>
                            <p class="text-xs text-zinc-400 font-medium leading-relaxed">${place.loreFocus}</p>
                        </div>
                    </div>
                    
                    <div>
                        <a href="${place.link}" class="w-full inline-flex items-center justify-between px-4 py-2.5 text-xs font-medium text-zinc-400 bg-white/5 border border-white/5 rounded-xl hover:bg-[#C5A880]/10 hover:border-[#C5A880]/30 hover:text-white transition-all group/btn" onclick="event.stopPropagation();">
                            <span>Examine Region Matrix</span>
                            <i class="fa-solid fa-arrow-right text-[10px] text-zinc-600 group-hover/btn:translate-x-0.5 group-hover/btn:text-[#C5A880] transition-all"></i>
                        </a>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        renderCards();
    </script>
</body>
</html>
